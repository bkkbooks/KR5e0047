body:
  text: 慧劍五首利物從來吹斷毛安邦輔主鎮凶豪忿生殺氣乾坤窄怒發陣雲天地高三尺寒光驚鬼魅千條冷艷破邪妖一聲霹靂九霄外化作飛龍不見毫非是雌雄别有鋒除邪破怪射寒空澹臺落處七星燦周處揮時萬派紅素色陰陽無可攝清光天地不能籠自從戰罷蚩尤後已得清平不施功匣中取出絶纖塵季札歸天無挂人寧受黄巢安社稷喜酬漢主定君臣動摇三尺諸邦息揮掃八方萬國賓當謝軒轅傳在世故教除佞佐明君三尺龍泉射斗牛不平之事便分憂磨開殺氣千魔息錯出陳雲百怪愁雪刃如風凉九夏霜鋒似月鑑三秋休休了却太平事挂向天邊永不收吾獲寶劍已多年入地穿山得自然瑞氣鑄成羣怪匿清光磨就萬邪遷輝輝光焰射星斗燦燦鋒鋩覆地天閑挂碧霄宫殿側不須重舉伴神仙聰眀頓悟圓融泯物情方知返樸顯聰明視之不見元無色聽後難聞那得聲覺耀遍周天地朗慧光普照鬼神驚包含萬象陰陽外獨露全身了太平題重皮谷玄都觀重皮古跡物風華地秀林泉隱道家疊疊嵐光生瑞草層層山色長靈芽時時曙氣連晨氣日日殘霞接晚霞眞箇無爲安穩地化龍巨海不停蛙閑步玄都觀妙哉茂林脩竹隱仙才奇哉異菓時時熟最妙仙花日日開鶴鳴松上雲還去虎嘯巖前風自來此地清凉誰會得洞天何處覓瑶臺俗事纏綿無出頭閑遊到此便忘憂風生九曲巖巒秀霧歛三峰草木幽門外雲埋樵子徑庵前溪隱渡仙舟人來問我藏縁事遥指白雪笑不休我是人間晦跡徒閑尋幽徑到玄都豁然物盡非難入頓覺塵忘逝不拘心似團團秋月朗性如片片野雲孤從他寒暑光陰速不計功名無礙夫中條山下一仙庄此處安閑日月長山秀千巖巖化玉地豐百草草開芳客來茶點松梢雪夜靜爐燒栢子香若是有人來到此世間萬慮盡俱忘中條西北有玄都瑞色紛紛道氣敷翠竹叢中藏道窟青松巖下隱仙閭連峰茂長靈芝草巨沼深容不夜珠遁跡不聞塵事冗清幽洒落小蓬壺詠竹實腹虚心君子才九包坐計好奇哉欺霜鳳子迎風秀傲雪龍孫帶雨培蒼翠最宜松並檻玲瓏偏稱栢同栽有時蛻殻施雲雨要見應難越九垓寒巖雅秀無多種惟有琅玕過歲華直節正當恬養素虚心恰合道生涯迎風瑟瑟清來冷載雨瀟瀟浄更嘉誰並眞常君子器偏宜仙洞道人家述懷一志無移便到家方知處處有煙霞摩挲星斗言休話驅逐風雲是莫誇性定不離降五藴命生何用運三車人人都有曹溪景咫尺蓬壺路不賒眞閑眞樂號玄冲七十年來養就慵處處林泉新活計家家雲水舊家風千經歷遍知忘盡萬法試周得不窮說與門生消息事月還西墜水流東道人活計本無憂性月輝輝得自由養素不須身外覓修眞何用意中求靈珠朗朗通天地素月輝輝射斗牛妙道從來常潔浄清都隱隱恣優游題重皮谷深溪條陽之北一溪流溉灌三田稼穡幽聲碎清風山色翠氣連白晝水光浮千波滚出驪珠窟萬派催行漁父舟好笑許由閑洗耳爭如出浪快心頭警世紛紛俗事日時忙昧了靈源勿忖量利害場中揮舌劍是非浪裏鬥唇鎗人間冗冗光陰速物外寥寥春晝長只此榮華何可並豈知沙界遍仙鄉哀哉塵務苦忙忙競氣貪財事事傷千種縈纏無可出萬端惹絆有爲妨迴頭掣斷是非鎖信脚踏翻名利場好去碧巖泉下隱安閑養素保純陽勸君莫進是非場萬苦千辛計漫張豈解利名風裏燭那知恩愛電中光貪榮爭似貪仙士趣富寧如趣道鄉若要躍出塵世網早歸巖下爇心香命汾陰張先生稽首知音張道人别來無恙樂天眞征鴻不寄蓬壺信遼鶴空傳閬苑春道院寥寥風作伴禪堂悄悄竹爲鄰先生莫失詩中約同賞瓊臺月一輪弔馬嗚呼騏驥好傷憫負我十年今命終一性飄飄辭世去三魂蕩蕩别行蹤空閑鞍轡我無力不動鞭韁尔有功蛻殻還源歸去好春雷一震化飛龍傷嗟奇異俊驊騮思尔無方進步遊日日遍周巡沙界時時普應復神州幾年布德無窮力今日别恩有徹頭願汝眞靈超物外却投巨海化蛟虬哀哉代步俊驊騮歷遍山川遐邇遊今尔去先功已就奈吾在後行難周數年穩跨騰飛鳳今日將亡的化虬冉冉騰空昇紫府安閑息步伴仙儔安恬養素道人活計不驕奢寂浄虚無度歲華默默頤神焉用酒昏昏保命不須茶安恬養拙純和素慎德踈慵閑莫姱奢也鍊就先天無價寶乘鸞隱隱去仙家寂靜無憂從來可慣皺眉頭本性安閑有甚憂明月照人諸業盡清風過目萬縁休街前世浪從他滚門外風波自在流學得希夷慵懶似黑甜一枕恣齁齁無縈無擊有何求灑落瀟瀟萬事休俗態紛紛無惹絆世情冗冗不淹留神珠朗朗寧能汙性月輝輝豈有綢閬苑不須窮脚力悟來迴首到瀛洲道貴自然一點靈明本自然何勞脚力覓神仙雨霽寶山石潤玉法海雲收火化蓮覺後不聞獅子吼悟來屏盡野狐禪親師太上玄玄趣躍出陰陽象帝先修眞不用費功夫切莫施爲愚騃徒擺髓摇筋皆是妄咽津納液轉乖迂神丹豈有多般作眞氣元無一事拘可笑諸人向外覓不離方寸有仙途閑中得趣閑中閑趣不安廬何必雲山巖壑居默默罷參三教典昏昏不舉五車書家風冷淡無還有活計清虚有不餘豈在盧都閑打坐圓明長鑑道如如深溪幽處結茅廬不向市鄽鬧處居不夜宫中無事客長明殿裏没羈儒澄澄法海波瀾息湛湛神潭淵浪虚罔象獲珠無措意不勞神思赴華胥贈道人李志遇眞箇閑閑李道人本來一點絶纖塵慧彰戒定言難說志覺無爲話不頻福地林泉皆是友洞天雲水盡爲鄰迴光解得長春意躍出陰陽劫外春贈吴道判老夫慵拈筆硯忙忽驚不覺鬢成霜眼前熟景光陰速物外家風白晝長好學陳摶三覺睡勿言杜甫九回腸休休作箇閑閑老脫盡塵勞有甚傷述懷閑行策杖出茅廬極目郊原錦不如鴈别衡陽天淡淡燕離海嶠雨踈踈一川好景妖桃綻滿地春光楊柳舒日晚歸來無箇事頤神養素樂無餘萬事俱忘不出廬藏縁無礙體如如人間利害般般盡眼底浮華物物踈興後蒲團盤膝坐悶來土塌展腰舒而今已作踈慵叟樂樂閑閑道本餘題王官谷玄通觀王官遺跡有星壇名號玄通觀隱仙山秀雲埋棲鳳竹土豐霧鎖化龍泉一峰帝業千年在三詔仙亭萬古傳仙帝超凡俱不面清名勿朽古今宣七言絕句初機發心容易久長難一志無移若泰山割斷愛縁塵不染自然灑落得清閑答王先生問道在何處忘非泯欲要堅心道在虚無何處尋認取本來眞面目拈來放下是知音贈張先生不悟掣開眉鎖抽身出割斷名纏便是休性若碧天雲片片萬縁無礙快心頭贈李道人絶念無爲李道人般般效下是全眞休休已得長生趣躍出陰陽劫外春詠茶金童採得靈芝葉玉女收將閬苑芽若是有人知此味清香勝過趙州茶神珠團團無相亦無蹤萬道霞光射碧空照耀大千含法界參天兩地豈能籠禪道禪道無爲道是禪道禪無二没枯偏本來一點無分别湛湛澄澄常現前坐浄湛湛寂寂方丈居凝神默默養神軀魂寧魄浄主賓會萬慮俱忘一物無玄虚子鳴真集
