front:
  text: 鳴真集序同二道本無言非言不顯道本無經非經不明令未聞者聞使未悟者悟僕肇拜玄沖師於汾陰龍興觀侍歲餘師南邁綿山之右誘矣僕北遷姑射之陽寓焉時師欬唾珠玉不構思或懷古或託物或贈答或逸興縱心所欲或詞或頌俱明宗旨陳非心之心言不言之言言言見諦句句朝宗其文簡其義淵鳴眞云無影樹頭花笑日不萌枝上葉含春又云兔角敲開三毒鎖龜毛拂盡九衢塵斯言離物象遠聲色非徹法慧目離念明智焉能究之哉深若淵泉曠如太虚恢恢焉晃晃焉尊上德之玄風崇長春之英華非詭詐以惑時非佐道而衒世玲玲瓏瓏如明珠旋於金盤清光罔極焕焕輝輝似秋月朗於碧天瑞氣何窮師亡金承安間有汾陰先生李公自海隅而還故邑師聞之廼長春之英徒也欲師之固辭拜長春者於是望拜祕奥得其一二悟機解有萬千幸有蒲坂同道寄世老人王巨川嗟憶師之珠玉特有英奇暢道之美云動若行雲之安泰止猶谷神之無隅發歎不已有寂子楊公劉先生等袖出師之集目之曰鳴眞集恐湮微散落命繕縷以廣其傳謁僕等飾題辭巨駭忸怩斗筲之器焉能納百川乎再三叩命固辭不已綜覽如瓊漿羊羹爽其羣口也體道之妙得道之用吐辭發言可不爲梯航耳夫鳴眞者鳴聲散宇宙不屈愈出若東君而發萌眞光射乾坤體在皆無如冰輪之鑒物明同杲日響若雷霆兹妙備矣歲在辛亥重陽後三日愚魯忝職河中道録汾陰張志明謹題玄虚子鳴眞集
  hash: sha256:ac73a9cdbd84f285fb6322d5cf491efb08a7ad6c0d67371acdb89e49d8298bab
